<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e7d3a2"/>
      <stop offset="0.5" stop-color="#cdab6c"/>
      <stop offset="1" stop-color="#b08a4e"/>
    </linearGradient>
    <radialGradient id="bg" cx="34%" cy="26%" r="85%">
      <stop offset="0" stop-color="#23252e"/>
      <stop offset="1" stop-color="#141519"/>
    </radialGradient>
    <filter id="glow" x="-90%" y="-90%" width="280%" height="280%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="26" result="b1"/>
      <feFlood flood-color="#c8a96a" flood-opacity="0.55"/>
      <feComposite in2="b1" operator="in" result="g1"/>
      <feGaussianBlur in="SourceAlpha" stdDeviation="12" result="b2"/>
      <feFlood flood-color="#eaddb0" flood-opacity="0.8"/>
      <feComposite in2="b2" operator="in" result="g2"/>
      <feMerge>
        <feMergeNode in="g1"/>
        <feMergeNode in="g1"/>
        <feMergeNode in="g2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <text x="256" y="344" text-anchor="middle"
    font-family="Helvetica, Arial, sans-serif" font-weight="700" font-size="250" letter-spacing="-8"
    fill="url(#gold)" filter="url(#glow)">NP</text>
</svg>
